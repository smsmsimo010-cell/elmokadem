<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElmoKaDem Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-blur: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.2);
            --accent-color: #fff;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            /* التعديل هنا: الامتداد أصبح .jpeg */
            background: #0f0f0f url('background.jpeg') no-repeat center center/cover fixed;
            display: flex;
            justify-content: center;
        }

        .overlay {
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            background: rgba(0, 0, 0, 0.7);
            width: 100%;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }

        .brand-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-name {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
        }

        .brand-sub {
            font-family: 'Montserrat', sans-serif;
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .button {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-blur);
            border: 1px solid var(--border-color);
            color: white;
            text-decoration: none;
            margin: 10px 0;
            width: 100%;
            max-width: 360px;
            border-radius: 12px;
            padding: 6px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .icon-box {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 18px;
            color: #fff;
        }

        .btn-text {
            flex-grow: 1;
            text-align: center;
            font-size: 15px;
            font-weight: 400;
            padding-right: 42px;
        }

        .fb .icon-box { background: #1877F2; }
        .ig .icon-box { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .tk .icon-box { background: #000; border: 1px solid rgba(255,255,255,0.2); }
        .wa .icon-box { background: #25D366; }
        .call .icon-box { background: #444; }
        
        .vfcash .icon-box { 
            background: #e60000; 
            font-weight: bold;
            font-size: 12px;
        }

        .button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

<div class="overlay">
    <img src="profile.jpg" class="profile" alt="ElmoKaDem">
    
    <div class="brand-container">
        <h1 class="brand-name">ELMOKADEM</h1>
        <div class="brand-sub">Wedding Photographer</div>
    </div>

    <a class="button fb" href="https://www.facebook.com/share/1AsaePx6C3/?mibextid=wwXIfr" target="_blank">
        <div class="icon-box"><i class="fab fa-facebook-f"></i></div>
        <div class="btn-text">Facebook Page</div>
    </a>

    <a class="button fb" href="https://www.facebook.com/share/1ZXYjBxA2C/?mibextid=wwXIfr" target="_blank">
        <div class="icon-box"><i class="fas fa-user-circle"></i></div>
        <div class="btn-text">Personal Profile</div>
    </a>
    
    <a class="button ig" href="https://www.instagram.com/elmokadem_photographer" target="_blank">
        <div class="icon-box"><i class="fab fa-instagram"></i></div>
        <div class="btn-text">Instagram</div>
    </a>
    
    <a class="button tk" href="https://www.tiktok.com/@elmokadem.photographar" target="_blank">
        <div class="icon-box"><i class="fab fa-tiktok"></i></div>
        <div class="btn-text">TikTok</div>
    </a>
    
    <a class="button wa" href="https://wa.me/201210425901" target="_blank">
        <div class="icon-box"><i class="fab fa-whatsapp"></i></div>
        <div class="btn-text">WhatsApp</div>
    </a>
    
    <a class="button call" href="tel:01092217287">
        <div class="icon-box"><i class="fas fa-phone-alt"></i></div>
        <div class="btn-text">Call Me</div>
    </a>

    <div class="button vfcash" onclick="handleVFCash()">
        <div class="icon-box">VF</div>
        <div class="btn-text">Vodafone Cash</div>
    </div>
</div>

<script>
function handleVFCash() {
    const code = "*9*7*01092217287*";
    navigator.clipboard.writeText(code).then(() => {
        alert("تم نسخ الكود بنجاح!\nاذهب الآن للوحة الاتصال، ضعه (لصق) ثم اكتب المبلغ و شباك (#)");
    }).catch(err => {
        prompt("انسخ الكود التالي وضعه في لوحة الاتصال:", code);
    });
}
</script>

</body>
</html>
